# Same stack as Docker Hub’s minimal example, but with the fields the app needs to reach MySQL.
# Use this when pulling from Docker Hub (no local build / no bind mount).
# Image tags: :latest follows the newest GitHub Release; :dev follows the latest commit on main/master; :<sha> is immutable.
#
# Copy to docker-compose.yml, change secrets, then: docker compose up -d
# Open http://localhost:8080 (or your mapped port) and complete install.php if required.

services:
  web:
    image: zacharykeatings/datadock:latest
    ports:
      - "8080:80"
    environment:
      # Required: PHP/Apache in the web container does not see MySQL on "localhost".
      # These must match the db service below (same values as MYSQL_* there).
      DATADOCK_DB_HOST: db
      DATADOCK_DB_NAME: datadock
      DATADOCK_DB_USER: datadock
      DATADOCK_DB_PASSWORD: changeme_app
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: changeme_root
      MYSQL_DATABASE: datadock
      MYSQL_USER: datadock
      MYSQL_PASSWORD: changeme_app
    volumes:
      - datadock_mysql:/var/lib/mysql

volumes:
  datadock_mysql:
