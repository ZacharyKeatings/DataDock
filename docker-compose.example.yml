# Example: develop from this repo (build + bind mount). Copy to docker-compose.yml and adjust secrets.
#
# For the published image from Docker Hub (no build, no mount), use docker-compose.hub.example.yml
# and paste that on Hub — it adds DATADOCK_DB_* on web.
#
# After containers are up, complete setup via install.php in a browser or scripts/datadock-install.php.
#
# Optional runtime overrides (see includes/settings_loader.php):
#   DATADOCK_READ_ONLY=1
#   DATADOCK_SITE_NAME=My Archive
#   DATADOCK_STORAGE_BASE_PATH=/var/www/html

services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      APACHE_RUN_USER: www-data
      # TCP to the db service (avoid "localhost" → Unix socket in the web container).
      DATADOCK_DB_HOST: db
      DATADOCK_DB_NAME: datadock
      DATADOCK_DB_USER: datadock
      DATADOCK_DB_PASSWORD: changeme_app
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: changeme_root
      MYSQL_DATABASE: datadock
      MYSQL_USER: datadock
      MYSQL_PASSWORD: changeme_app
    volumes:
      - datadock_mysql:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  datadock_mysql:
