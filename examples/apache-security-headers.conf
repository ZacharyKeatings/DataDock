# Optional Apache configuration snippets for DataDock (v2.5+).
# Include from a VirtualHost or merge into an existing <Directory> block.
# If PHP already sends the same headers (security_headers_mode), omit duplicates.

<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Frame-Options "SAMEORIGIN"

    # Behind HTTPS only:
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Stricter framing:
    # Header always set X-Frame-Options "DENY"

    # Example CSP — tune for your deployment:
    # Header always set Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob: https:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net"
</IfModule>
