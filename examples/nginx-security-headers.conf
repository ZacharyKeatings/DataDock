# Optional reverse-proxy headers for DataDock (v2.5+).
# Merge relevant directives into your server or location block; do not duplicate
# headers already sent by PHP when security_headers_mode is "recommended" or "strict".

# add_header always ...;  # use "always" if you need headers on error responses

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "SAMEORIGIN" always;

# Uncomment behind TLS termination only (sends HSTS to browsers):
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Stricter framing (cannot be embedded even same-site):
# add_header X-Frame-Options "DENY" always;

# Example CSP — must match your asset hosts (CDN, fonts, etc.):
# add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob: https:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net" always;
