# Build and push to Docker Hub on:
#   - Every push to main or master (tags: <git-sha>, dev — rolling tip of default branch)
#   - Published releases (tags: semver, latest, <git-sha> — latest = newest release only)
#   - workflow_dispatch (sha always; dev when run on main/master; semver/latest only on release events)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — Docker Hub username or organization name
#   DOCKERHUB_TOKEN     — Access token (Account Settings → Security → New Access Token)
#
# Optional repository variable (Settings → Variables → Actions):
#   DOCKERHUB_IMAGE     — Full image name, e.g. myorg/datadock (default: DOCKERHUB_USERNAME/datadock)

name: Publish Docker image

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image name
        id: image
        run: |
          if [ -n "${{ vars.DOCKERHUB_IMAGE }}" ]; then
            echo "name=${{ vars.DOCKERHUB_IMAGE }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ secrets.DOCKERHUB_USERNAME }}/datadock" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata and tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=dev,enable=${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'main' || github.ref_name == 'master') }}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
